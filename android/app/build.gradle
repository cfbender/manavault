apply plugin: 'com.android.application'

def manavaultVersionName() {
    def override = System.getenv("MANAVAULT_VERSION")
    if (override != null && override.trim()) {
        return override.trim().replaceFirst(/^v/, "")
    }

    def mixFile = rootProject.file("../mix.exs")
    def matcher = mixFile.text =~ /version:\s*"([0-9]+(?:\.[0-9]+){2}(?:[-+][^"]+)?)"/
    if (!matcher.find()) {
        throw new GradleException("Could not find semver project version in ${mixFile}")
    }

    return matcher.group(1)
}

def manavaultVersionCode(String versionName) {
    def override = System.getenv("MANAVAULT_VERSION_CODE")
    if (override != null && override.trim()) {
        return override.toInteger()
    }

    def parts = versionName.split(/[-+]/)[0].tokenize('.').collect { it.toInteger() }
    if (parts.size() != 3) {
        throw new GradleException("Could not derive Android versionCode from ${versionName}")
    }

    return parts[0] * 10000 + parts[1] * 100 + parts[2]
}

def manavaultVersion = manavaultVersionName()
def manavaultSigningProperty(String name) {
    def envValue = System.getenv(name)
    if (envValue != null && envValue.trim()) {
        return envValue.trim()
    }

    if (project.hasProperty(name)) {
        def projectValue = project.property(name).toString()
        if (projectValue.trim()) {
            return projectValue.trim()
        }
    }

    return null
}

def manavaultReleaseStoreFile = manavaultSigningProperty("MANAVAULT_ANDROID_KEYSTORE")
def manavaultReleaseStorePassword = manavaultSigningProperty("MANAVAULT_ANDROID_KEYSTORE_PASSWORD")
def manavaultReleaseKeyAlias = manavaultSigningProperty("MANAVAULT_ANDROID_KEY_ALIAS")
def manavaultReleaseKeyPassword = manavaultSigningProperty("MANAVAULT_ANDROID_KEY_PASSWORD")
def manavaultReleaseSigningConfigured =
        manavaultReleaseStoreFile &&
        manavaultReleaseStorePassword &&
        manavaultReleaseKeyAlias &&
        manavaultReleaseKeyPassword


android {
    namespace = "dev.cfb.manavault"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "dev.cfb.manavault"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode manavaultVersionCode(manavaultVersion)
        versionName manavaultVersion
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (manavaultReleaseSigningConfigured) {
                storeFile file(manavaultReleaseStoreFile)
                storePassword manavaultReleaseStorePassword
                keyAlias manavaultReleaseKeyAlias
                keyPassword manavaultReleaseKeyPassword
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            if (manavaultReleaseSigningConfigured) {
                signingConfig signingConfigs.release
            }
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

gradle.taskGraph.whenReady { taskGraph ->
    if (taskGraph.hasTask(":app:assembleRelease") && !manavaultReleaseSigningConfigured) {
        throw new GradleException("Release APKs must be signed. Set MANAVAULT_ANDROID_KEYSTORE, MANAVAULT_ANDROID_KEYSTORE_PASSWORD, MANAVAULT_ANDROID_KEY_ALIAS, and MANAVAULT_ANDROID_KEY_PASSWORD.")
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
