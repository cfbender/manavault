[tools]
android-sdk = "latest"
aube = "1.21.0"
cloudflared = "latest"
elixir = "1.20.1-otp-29"
git-cliff = "latest"
java = "21"
node = "22.22.2"

[tasks.setup]
description = "Install project tools, Elixir dependencies, database, assets, and native shell dependencies."
run = "mise install && aube install --frozen-lockfile && mix setup"


[tasks.dev]
description = "Start the Phoenix development server."
run = "mix phx.server"

[tasks.test]
description = "Run the Elixir test suite."
run = "mix test"

[tasks.precommit]
description = "Run tests and linting before committing code."
run = [
  "mix test",
  "mix format --check-formatted",
  "mix credo --strict",
  "aube run vp lint",
  "aube run vp format --check",
]

[tasks.changelog]
description = "Generate CHANGELOG.md for the next major/minor/patch version."
usage = '''
arg "<part>" help="Version part to bump" {
  choices "major" "minor" "patch"
}
'''
run = "bash ./scripts/changelog.sh ${usage_part?}"

[tasks.release]
description = "Generate changelog and release the next major/minor/patch version."
usage = '''
arg "<part>" help="Version part to bump" {
  choices "major" "minor" "patch"
}
'''
run = ["bash ./scripts/changelog.sh ${usage_part?}", "bash ./scripts/bump.sh ${usage_part?}"]

[tasks."setup:native"]
description = "Install JavaScript dependencies and sync Capacitor native projects."
run = "aube install --frozen-lockfile && aube run cap:sync"

[tasks."setup:android-sdk"]
description = "Accept Android SDK licenses and install SDK packages needed by Capacitor/native-run."
run = "yes | sdkmanager --licenses && sdkmanager 'platform-tools' 'platforms;android-36' 'build-tools;35.0.0' 'build-tools;36.0.0'"

[tasks."android:sync"]
description = "Prepare native web metadata and sync the Capacitor Android project."
run = "aube run cap:sync:android"

[tasks."android:build"]
description = "Build a debug Capacitor Android APK."
run = "aube run android:build:debug"

[tasks."android:run"]
description = "Build and run the Capacitor Android app on a connected device."
run = "aube run cap:run:android"

[tasks."android:open"]
description = "Open the Capacitor Android project in Android Studio."
run = "aube run cap:open:android"

[tasks."ios:sync"]
description = "Sync the Capacitor iOS project. Requires macOS for native iOS builds."
run = "aube run cap:sync:ios"

[tasks."ios:open"]
description = "Open the Capacitor iOS project in Xcode. Requires macOS."
run = "aube run cap:open:ios"
